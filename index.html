<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet" />
    <title>Larguei Mão</title>
    <meta name="description" content="Desapegue de itens usados de forma simples e rápida" />
    <meta name="author" content="Lovable" />

    <!-- App icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=2" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#265939" />

    <!-- Meta tags sociais -->
    <meta property="og:title" content="Larguei Mão" />
    <meta property="og:description" content="Desapegue de itens usados de forma simples e rápida." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icon-512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Larguei Mão" />
    <meta name="twitter:description" content="Desapegue de itens usados de forma simples e rápida." />
    <meta name="twitter:image" content="/icon-512.png" />
  </head>

  <body style="background-color: #265939;">
    <style>
      body { margin: 0; padding: 0; background-color: #265939; }
      .splash-container { display: flex; min-height: 100vh; flex-direction: column; align-items: center; justify-content: center; background-color: #265939; color: #ffffff; }
      .splash-title { margin-bottom: 1.5rem; font-family: 'Nunito', sans-serif; font-size: 3rem; line-height: 1; font-weight: 900; color: #ffffff; filter: drop-shadow(0 4px 3px rgba(0,0,0,0.07)) drop-shadow(0 2px 2px rgba(0,0,0,0.06)); }
      .splash-image-wrapper { margin-bottom: 3rem; }
      .splash-image { height: 10rem; width: 10rem; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4)); }
      .splash-loader-wrapper { margin-bottom: 1.5rem; display: flex; flex-direction: column; align-items: center; gap: 0.75rem; color: rgba(255, 255, 255, 0.8); }
      .splash-spinner { width: 2rem; height: 2rem; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: rgba(255,255,255,0.8); animation: spin 1s linear infinite; }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .splash-loading-text { font-family: 'Nunito', sans-serif; font-size: 0.875rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
      .splash-phrase { margin-top: 1rem; text-align: center; font-family: 'Nunito', sans-serif; font-size: 0.875rem; font-weight: 900; letter-spacing: 0.05em; color: rgba(255, 255, 255, 0.9); padding-left: 2rem; padding-right: 2rem; line-height: 1.625; filter: drop-shadow(0 1px 1px rgba(0,0,0,0.05)); }
    </style>
    <div id="root">
      <div class="splash-container">
        <h1 class="splash-title">Larguei Mão</h1>
        <div class="splash-image-wrapper">
          <img src="/logo_cuia_transparent.png" alt="Logo Larguei Mão" class="splash-image" />
        </div>
        <div class="splash-loader-wrapper">
          <div class="splash-spinner"></div>
          <span class="splash-loading-text">Carregando...</span>
        </div>
        <p class="splash-phrase">O QUE NÃO SERVE MAIS PRA TI<br />PODE SERVIR PRA ALGUÉM.</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
