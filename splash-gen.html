<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=2732, height=2732, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');
    body {
      margin: 0;
      padding: 0;
      width: 2732px;
      height: 2732px;
      background-color: #265939;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Nunito', sans-serif;
    }
    .title {
      font-size: 200px;
      font-weight: 900;
      color: white;
      margin-top: 0;
      margin-bottom: 120px;
      text-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    .logo {
      width: 800px;
      height: 800px;
      margin-bottom: 250px;
      filter: drop-shadow(0 20px 40px rgba(0,0,0,0.4));
    }
    .phrase {
      font-size: 70px;
      font-weight: 900;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
      letter-spacing: 5px;
      line-height: 1.5;
      text-shadow: 0 5px 10px rgba(0,0,0,0.1);
      margin: 0;
    }
  </style>
</head>
<body>
  <h1 class="title">Larguei Mão</h1>
  <img class="logo" src="./public/logo_cuia_transparent.png" alt="Logo">
  <p class="phrase">O QUE NÃO SERVE MAIS PRA TI<br/>PODE SERVIR PRA ALGUÉM.</p>
</body>
</html>
